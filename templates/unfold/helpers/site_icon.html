{% load i18n %}

<div class="shrink-0 mr-3">
    <{% if site_dropdown %}span{% else %}a href="{% url 'admin:index' %}"{% endif %} class="block">
        <div style="width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, #14b8a6, #34d399); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(20,184,166,0.15);">
            <svg style="width: 22px; height: 22px; color: #0f172a;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
        </div>
    </{% if site_dropdown %}span{% else %}a{% endif %}>
</div>

<div class="flex flex-col grow justify-center min-w-0">
    <div style="font-weight: 700; font-size: 13px; line-height: 1.3; white-space: normal; word-wrap: break-word; overflow-wrap: break-word;" class="text-slate-900 dark:text-white">
        {{ branding }}
    </div>

    {% if site_subheader %}
        <div class="font-normal text-subtle text-xs truncate">
            {{ site_subheader }}
        </div>
    {% endif %}
</div>
