{% load i18n static %}

<div class="shrink-0 mr-3">
    <{% if site_dropdown %}span{% else %}a href="{% url 'admin:index' %}"{% endif %} class="block m-0 p-0">
        <div style="display: inline-flex; align-items: center; justify-content: center; height: 72px; margin: 0; padding: 0; border: 3px solid rgba(100, 116, 139, 0.85); border-radius: 0; background: rgba(255, 255, 255, 0.95); overflow: hidden; max-width: 100%;">
            <img
                src="{% static 'hd-logo.png' %}"
                alt="Ramlal Golchha Eye Hospital Foundation"
                style="height: 100%; width: auto; max-width: 100%; margin: 0; padding: 0; object-fit: contain; display: block; border-radius: 0;"
            />
        </div>
    </{% if site_dropdown %}span{% else %}a{% endif %}>
</div>

<div class="flex flex-col grow justify-center min-w-0">
    <div style="font-weight: 700; font-size: 13px; line-height: 1.3; white-space: normal; word-wrap: break-word; overflow-wrap: break-word;" class="text-slate-900 dark:text-white">
        {{ branding }}
    </div>

    {% if site_subheader %}
        <div class="font-normal text-subtle text-xs truncate">
            {{ site_subheader }}
        </div>
    {% endif %}
</div>
