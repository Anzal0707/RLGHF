{% load i18n static %}

<div class="border-b border-base-200 mb-8 pb-6 dark:border-base-800">
    <div class="flex items-center gap-3 mb-4">
        <div style="display: inline-flex; align-items: center; justify-content: center; height: 112px; margin: 0; padding: 0; border: 3px solid rgba(100, 116, 139, 0.85); border-radius: 0; background: rgba(255, 255, 255, 0.95); overflow: hidden; flex-shrink: 0; max-width: 100%;">
            <img
                src="{% static 'hd-logo.png' %}"
                alt="Ramlal Golchha Eye Hospital Foundation"
                style="height: 100%; width: auto; max-width: 100%; margin: 0; padding: 0; object-fit: contain; display: block; border-radius: 0;"
            />
        </div>
        <span style="font-weight: 800; font-size: 16px; line-height: 1.3; color: #14b8a6;">{{ title }}</span>
    </div>
</div>
